<!DOCTYPE html>
<html lang="ko">
<head>
   <link rel="manifest" href="manifest.json">
   <meta name="theme-color" content="#0070f3">
   <meta name="mobile-web-app-capable" content="yes">
   <meta name="apple-mobile-web-app-capable" content="yes">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>형님의 N-장부</title>
    <style>
        :root { --primary: #0070f3; --neg: #ff4d4f; --bg: #f0f2f5; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 15px; padding-bottom: 140px; }
        .tabs-container { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 10px; margin-bottom: 15px; align-items: center; -webkit-overflow-scrolling: touch; }
        .tab-btn { padding: 8px 16px; border: none; border-radius: 18px; background: #fff; white-space: nowrap; cursor: pointer; border: 1px solid #ddd; font-size: 14px; }
        .tab-btn.active { background: var(--primary); color: white; border-color: var(--primary); font-weight: bold; }
        
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 6px rgba(0,0,0,0.05); margin-bottom: 15px; }
        input { width: 100%; padding: 12px; margin: 5px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #eee; }
        .item-info { display: flex; flex-direction: column; }
        .del-btn { color: #ccc; border: none; background: none; padding: 10px; font-size: 18px; cursor: pointer; }
        
        .footer { position: fixed; bottom: 0; left: 0; right: 0; background: #222; color: white; padding: 15px; border-radius: 15px 15px 0 0; z-index: 1000; }
        .btn-group { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
        button.main-btn { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 16px; }
        button.sub-btn { flex: 1; min-width: 60px; background: #444; color: white; border: none; padding: 8px 5px; border-radius: 6px; font-size: 11px; }
    </style>
</head>
<body>

<div class="tabs-container" id="tabBar"></div>

<div class="card">
    <div id="currentTabTitle" style="font-weight: bold; margin-bottom: 10px; color: var(--primary); font-size: 14px;"></div>
    <input type="date" id="dateInput">
    <input type="text" id="descInput" placeholder="내용 (예: 치과 소모품)">
    <input type="number" id="amtInput" placeholder="금액 (지출은 -입력)">
    <button class="main-btn" onclick="addItem()">내역 추가</button>
</div>

<div id="historyList"></div>

<div class="footer">
    <div style="display:flex; justify-content: space-between; align-items: center;">
        <span style="font-size: 14px; color: #aaa;">현재 탭 합계</span>
        <span id="totalDisplay" style="font-size: 22px; font-weight: bold; color: #fff;">0원</span>
    </div>
    <div class="btn-group">
        <button class="sub-btn" onclick="renameTab()">이름변경</button>
        <button class="sub-btn" onclick="deleteTab()" style="background: #622;">탭삭제</button>
        <button class="sub-btn" onclick="addTab()">+탭추가</button>
        <button class="sub-btn" onclick="exportToExcel()" style="background: #28a745;">엑셀백업</button>
        <button class="sub-btn" onclick="importData()" style="background: #6c757d;">데이터복구</button>
    </div>
</div>

<script>
    let store = JSON.parse(localStorage.getItem('myLedger')) || {
        tabs: ['치과지출', '생활비'],
        current: '치과지출',
        data: { '치과지출': [], '생활비': [] }
    };

    function saveData() {
        localStorage.setItem('myLedger', JSON.stringify(store));
        render();
    }

    function addTab() {
        const name = prompt('새 탭 이름을 입력하세요');
        if (name && !store.tabs.includes(name)) {
            store.tabs.push(name);
            store.data[name] = [];
            store.current = name;
            saveData();
        }
    }

    function deleteTab() {
        if (store.tabs.length <= 1) return alert('최소 한 개의 탭은 있어야 합니다.');
        if (confirm(`'${store.current}' 탭의 모든 내역이 사라집니다. 삭제할까요?`)) {
            const idx = store.tabs.indexOf(store.current);
            store.tabs.splice(idx, 1);
            delete store.data[store.current];
            store.current = store.tabs[0];
            saveData();
        }
    }

    function renameTab() {
        const newName = prompt('변경할 이름을 입력하세요', store.current);
        if (newName && !store.tabs.includes(newName)) {
            const idx = store.tabs.indexOf(store.current);
            store.tabs[idx] = newName;
            store.data[newName] = store.data[store.current];
            delete store.data[store.current];
            store.current = newName;
            saveData();
        }
    }

    function switchTab(name) {
        store.current = name;
        saveData();
    }

    function addItem() {
        const date = document.getElementById('dateInput').value;
        const desc = document.getElementById('descInput').value;
        const amtInput = document.getElementById('amtInput');
        const amt = parseFloat(amtInput.value);
        if (!desc || isNaN(amt)) return;

        if(!store.data[store.current]) store.data[store.current] = [];
        store.data[store.current].push({ id: Date.now(), date, desc, amt });
        document.getElementById('descInput').value = '';
        amtInput.value = '';
        saveData();
    }

    function deleteItem(id) {
        if (confirm("이 내역을 삭제할까요?")) {
            store.data[store.current] = store.data[store.current].filter(item => item.id !== id);
            saveData();
        }
    }

    function render() {
        const tabBar = document.getElementById('tabBar');
        tabBar.innerHTML = store.tabs.map(t => 
            `<button class="tab-btn ${t === store.current ? 'active' : ''}" onclick="switchTab('${t}')">${t}</button>`
        ).join('');

        document.getElementById('currentTabTitle').innerText = `[${store.current}] 관리 중`;

        const listDiv = document.getElementById('historyList');
        let total = 0;
        let html = '';

        const currentItems = store.data[store.current] || [];
        currentItems.sort((a, b) => new Date(b.date) - new Date(a.date)).forEach(item => {
            total += item.amt;
            html += `
                <div class="list-item">
                    <div class="item-info">
                        <small style="color:#666">${item.date}</small>
                        <span>${item.desc}</span>
                    </div>
                    <div style="display:flex; align-items:center;">
                        <span style="font-weight:bold; color:${item.amt >= 0 ? '#0070f3' : '#ff4d4f'}">
                            ${item.amt.toLocaleString()}원
                        </span>
                        <button class="del-btn" onclick="deleteItem(${item.id})">✕</button>
                    </div>
                </div>`;
        });

        listDiv.innerHTML = html;
        document.getElementById('totalDisplay').innerText = total.toLocaleString() + '원';
    }

    function exportToExcel() {
        let csvContent = "\uFEFF날짜,내용,금액,카테고리\n";
        store.tabs.forEach(tab => {
            if(store.data[tab]) {
                store.data[tab].forEach(item => {
                    csvContent += `${item.date},${item.desc},${item.amt},${tab}\n`;
                });
            }
        });
        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `장부백업_${new Date().toISOString().slice(0,10)}.csv`;
        link.click();
    }

    function importData() {
        const json = prompt('데이터 코드를 붙여넣으세요');
        if (json) {
            try {
                const parsed = JSON.parse(json);
                if (parsed.tabs && parsed.data) {
                    store = parsed;
                    saveData();
                    alert('복구 성공!');
                }
            } catch (e) { alert('코드 형식이 잘못되었습니다.'); }
        }
    }

    document.getElementById('dateInput').value = new Date().toISOString().substring(0, 10);
    render();
</script>
</body>
</html>
